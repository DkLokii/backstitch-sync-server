app = "godot-game-sync-team-12432 "
primary_region = "iad"

[build]
  builder = "paketobuildpacks/builder-jammy-full:latest"

[http_service]
  internal_port = 8085
  force_https = true
  auto_stop_machines = "off" 
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval = "10s"
    method = "get"
    path = "/"
    protocol = "http"
    timeout = "2s"
    tls_skip_verify = false
