# fly.toml app configuration file generated for backstitch-sync-server on 2026-06-26T02:35:20Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backstitch-sync-server'
primary_region = 'iad'

[build]

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
